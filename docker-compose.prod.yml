# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.9"

services:
  frontend:
    ports: !reset []   # Caddy handles public traffic — don't expose directly
    environment:
      - VITE_API_URL=https://touse.app
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    ports: !reset []
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD}@postgres:5432/touse
      - REDIS_URL=redis://redis:6379/0
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery:
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD}@postgres:5432/touse
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD}@postgres:5432/touse
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  postgres:
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    command: redis-server --save 60 1 --loglevel warning
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
