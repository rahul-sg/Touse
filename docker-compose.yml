services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_MAPBOX_TOKEN=${MAPBOX_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD:-touse}@postgres:5432/touse
      - REDIS_URL=redis://redis:6379/0
      - RATELIMIT_STORAGE_URI=redis://redis:6379/1
      - FRED_API_KEY=${FRED_API_KEY}
      - BLS_API_KEY=${BLS_API_KEY}
      - BEA_API_KEY=${BEA_API_KEY}
      - CENSUS_API_KEY=${CENSUS_API_KEY}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - EXTRA_CORS_ORIGINS=${EXTRA_CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD:-touse}@postgres:5432/touse
      - REDIS_URL=redis://redis:6379/0
      - FRED_API_KEY=${FRED_API_KEY}
      - BLS_API_KEY=${BLS_API_KEY}
      - BEA_API_KEY=${BEA_API_KEY}
      - CENSUS_API_KEY=${CENSUS_API_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://touse:${DB_PASSWORD:-touse}@postgres:5432/touse
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=touse
      - POSTGRES_PASSWORD=${DB_PASSWORD:-touse}
      - POSTGRES_DB=touse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:
